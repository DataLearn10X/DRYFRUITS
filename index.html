<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium DryFruits</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f7fc;
}

header{
background:linear-gradient(135deg,#5a2d0c,#a65c1c);
color:white;
text-align:center;
padding:60px 20px;
}

.products{
padding:40px;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:120px;
}

.price{
color:green;
font-weight:bold;
}

.order{
background:#eef4ff;
padding:30px;
margin:40px;
border-radius:10px;
text-align:center;
}

input{
padding:12px;
margin:6px;
width:250px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#16a34a;
color:white;
border:none;
padding:12px 30px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>Premium DryFruits</h1>
<p>Fresh & Healthy Dry Fruits Delivered at Home</p>
</header>


<section class="products">

<h2 style="text-align:center">Our Products</h2>

<div class="grid">

<div class="card">
<img src="https://i.imgur.com/XQq0J7F.png">
<h3>Almonds</h3>
<p class="price">₹450 / 500g</p>
</div>

<div class="card">
<img src="https://i.imgur.com/XQq0J7F.png">
<h3>Cashews</h3>
<p class="price">₹520 / 500g</p>
</div>

<div class="card">
<img src="https://i.imgur.com/XQq0J7F.png">
<h3>Pistachios</h3>
<p class="price">₹650 / 500g</p>
</div>

<div class="card">
<img src="https://i.imgur.com/XQq0J7F.png">
<h3>Walnuts</h3>
<p class="price">₹480 / 500g</p>
</div>

<div class="card">
<img src="https://i.imgur.com/XQq0J7F.png">
<h3>Raisins</h3>
<p class="price">₹300 / 500g</p>
</div>

</div>

</section>


<section class="order">

<h2>Order Now (Cash On Delivery)</h2>

<input type="text" placeholder="Full Name"><br>

<input type="text" placeholder="Mobile Number"><br>

<input type="text" placeholder="Full Address"><br>

<button>Place Order</button>

</section>

</body>
</html>
