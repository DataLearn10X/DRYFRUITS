<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium DryFruits</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Poppins;
background:#f4f7fc;
color:#1f2f46;
}

.hero{
background:linear-gradient(135deg,#0b1220,#7c3aed,#2563eb);
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
opacity:.9;
}

.ads{
max-width:1100px;
margin:30px auto;
overflow:hidden;
border-radius:15px;
}

.ads img{
width:100%;
height:220px;
object-fit:cover;
}

.section{
padding:50px 20px;
}

.container{
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 10px 20px rgba(0,0,0,.08);
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100px;
height:100px;
object-fit:contain;
margin-bottom:10px;
}

.price{
color:#16a34a;
font-weight:700;
margin-top:5px;
}

.bucket{
background:#eef4ff;
padding:30px;
border-radius:15px;
}

.chk{
display:block;
margin:6px 0;
}

.total{
font-size:22px;
font-weight:700;
margin:15px 0;
color:#14532d;
}

input{
width:90%;
max-width:400px;
padding:12px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#16a34a;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
font-weight:600;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:65px;
height:65px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.whatsapp img{
width:35px;
}

</style>

</head>

<body>

<header class="hero">

<h1>Premium DryFruits</h1>

<p>Fresh & Healthy Premium Quality Dry Fruits</p>

</header>

<div class="ads">
<img id="adsImg" src="https://images.unsplash.com/photo-1606312619344-8d7c4d8e63b6">
</div>

<section class="section">

<div class="container">

<h2 style="text-align:center;margin-bottom:30px">Our Premium Dry Fruits</h2>

<div class="grid" id="productGrid"></div>

</div>

</section>

<section class="section">

<div class="container bucket">

<h2>Add to Bucket</h2>

<div class="total" id="total">Total ₹0</div>

<input id="name" placeholder="Full Name"><br>
<input id="mobile" placeholder="Mobile Number"><br>
<input id="address" placeholder="Full Address"><br>

<button onclick="order()">Place Order (Cash on Delivery)</button>

</div>

</section>

<a class="whatsapp" href="https://wa.me/919403030512">
<img src="https://img.icons8.com/color/48/whatsapp.png">
</a>

<script>

const products=[

{name:"Almonds",price:450,img:"https://img.icons8.com/color/96/almond.png"},
{name:"Cashews",price:520,img:"https://img.icons8.com/color/96/cashew.png"},
{name:"Pistachios",price:650,img:"https://img.icons8.com/color/96/pistachio.png"},
{name:"Walnuts",price:480,img:"https://img.icons8.com/color/96/walnut.png"},
{name:"Raisins",price:300,img:"https://img.icons8.com/color/96/raisins.png"},
{name:"Black Raisins",price:350,img:"https://img.icons8.com/color/96/raisins.png"},
{name:"Anjeer",price:700,img:"https://img.icons8.com/color/96/fig.png"},
{name:"Dates",price:280,img:"https://img.icons8.com/color/96/dates.png"},
{name:"Dry Apricot",price:600,img:"https://img.icons8.com/color/96/apricot.png"},
{name:"Pine Nuts",price:900,img:"https://img.icons8.com/color/96/pine-nut.png"},
{name:"Makhana",price:350,img:"https://img.icons8.com/color/96/popcorn.png"},
{name:"Dry Coconut",price:250,img:"https://img.icons8.com/color/96/coconut.png"},
{name:"Pecan Nuts",price:850,img:"https://img.icons8.com/color/96/walnut.png"},
{name:"Hazelnuts",price:750,img:"https://img.icons8.com/color/96/hazelnut.png"},
{name:"Mixed Dry Fruits",price:650,img:"https://img.icons8.com/color/96/mixed-nuts.png"}

]

const grid=document.getElementById("productGrid")

products.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">₹${p.price} / 500g</div>

<label class="chk">

<input type="checkbox" class="productChk" data-price="${p.price}" value="${p.name}">

Add to Bucket

</label>

</div>

`

})

const checks=document.querySelectorAll(".productChk")
const totalText=document.getElementById("total")

function update(){

let total=0

checks.forEach(c=>{
if(c.checked) total+=Number(c.dataset.price)
})

totalText.innerText="Total ₹"+total

}

checks.forEach(c=>c.addEventListener("change",update))

function order(){

const name=document.getElementById("name").value
const mobile=document.getElementById("mobile").value
const address=document.getElementById("address").value

let items=[]

checks.forEach(c=>{
if(c.checked) items.push(c.value)
})

const msg=
"New Dry Fruits Order%0A%0A"+
"Name: "+name+"%0A"+
"Mobile: "+mobile+"%0A"+
"Address: "+address+"%0A%0A"+
"Products: "+items.join(", ")

window.open("https://wa.me/919403030512?text="+msg)

}

</script>

</body>
</html>
